<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewShire University — Training &amp; Compliance</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231C3740'/><text x='16' y='22' text-anchor='middle' font-size='18' fill='%23CDA04B'>U</text></svg>" />
  <style>
    body { margin: 0; padding: 0; background: #F7F8F7; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    /* Written lesson content (LessonBody HTML) */
    .ns-lesson-body h3, .ns-lesson-body h4 { color: #28434C; margin: 18px 0 8px; font-weight: 700; }
    .ns-lesson-body h3 { font-size: 18px; }
    .ns-lesson-body h4 { font-size: 16px; }
    .ns-lesson-body p { margin: 0 0 12px; }
    .ns-lesson-body ul, .ns-lesson-body ol { margin: 0 0 14px; padding-left: 22px; }
    .ns-lesson-body li { margin-bottom: 6px; }
    .ns-lesson-body strong { color: #28434C; }
    .ns-lesson-body a { color: #9E7B2F; }
    .ns-lesson-body .callout { background: #FFFBF0; border-left: 4px solid #CDA04B; border-radius: 4px; padding: 12px 16px; margin: 14px 0; }
    .ns-lesson-body .callout strong, .ns-lesson-body .callout .callout-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #9E7B2F; margin-bottom: 4px; }
    .ns-lesson-body .script { background: #EDF4F7; border-radius: 6px; padding: 12px 16px; margin: 12px 0; font-style: italic; color: #2F5260; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Pinned to 7.x: Babel 8 defaults JSX to the automatic runtime (injects a react/jsx-runtime
       import) which breaks this classic-script + React-UMD setup. Do not remove the @7 pin. -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script type="text/babel" src="training-lms.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
